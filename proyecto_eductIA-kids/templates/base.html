<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EducatIA kids{% endblock %}</title>

  <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>🌱 EducatIA KIDS</h2>
    <ul>
      <li><a href="/">Inicio</a></li>
      <li><a href="/aprendizaje">Aprendizajes</a></li>
      <li><a href="/beneficios">Beneficios</a></li>
      <li><a href="/contacto">Contacto</a></li>
      <li><a href="/mapa">Mapa</a></li>
    </ul>
  </nav>

  <!-- CONTENIDO DINÁMICO -->
  {% block content %}
  {% endblock %}

  <!-- BOTÓN CHAT -->
  <button id="chat-toggle" class="chat-toggle">💬</button>

  <!-- CHAT -->
  <div id="chat-wrapper" class="chat-wrapper">
    <div class="chat-header">
      <span>🤖 Chatbot</span>
      <button id="chat-close">✖</button>
    </div>

    <div id="chatbox">
      <div id="messages"></div>
      <form id="chatForm">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off" />
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

  <script>
    const chatToggle = document.getElementById("chat-toggle");
    const chatWrapper = document.getElementById("chat-wrapper");
    const chatClose = document.getElementById("chat-close");

    chatToggle.addEventListener("click", () => {
      chatWrapper.style.display = "flex";
    });

    chatClose.addEventListener("click", () => {
      chatWrapper.style.display = "none";
    });
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EducatIA kids{% endblock %}</title>

  <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>

  <!-- NAVBAR -->
  <!-- <nav class="navbar">
    <h2>🌱 EducatIA KIDS</h2>
    <ul>
      <li><a href="/">Inicio</a></li>
      <li><a href="/aprendizaje">Aprendizajes</a></li>
      <li><a href="/beneficios">Beneficios</a></li>
      <li><a href="/contacto">Contacto</a></li>
    </ul>
  </nav> -->

  <!-- NAVBAR MEJORADA -->
<nav class="navbar-custom">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <span class="logo-icon">🌱</span> 
      <span class="logo-text">EducatIA <span class="kids-highlight">KIDS</span></span>
    </a>
    
    <!-- Botón para menú móvil (Hamburguesa) -->
    <input type="checkbox" id="nav-check">
    <label for="nav-check" class="nav-btn">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <ul class="nav-links">
      <li><a href="/" class="nav-item">Inicio</a></li>
      <li><a href="/aprendizaje" class="nav-item">Aprendizajes</a></li>
      <li><a href="/beneficios" class="nav-item">Beneficios</a></li>
      <li><a href="/contacto" class="nav-item contact-special">Contacto</a></li>
    </ul>
  </div>
</nav>

  <!-- CONTENIDO DINÁMICO -->
  {% block content %}
  {% endblock %}

  <!-- BOTÓN CHAT -->
  <button id="chat-toggle" class="chat-toggle">💬</button>

  <!-- CHAT -->
  <div id="chat-wrapper" class="chat-wrapper">
    <div class="chat-header">
      <span>🤖 Chatbot</span>
      <button id="chat-close">✖</button>
    </div>

    <div id="chatbox">
      <div id="messages"></div>
      <form id="chatForm">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off" />
      </form>
    </div>
  </div>


  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    chatToggle.addEventListener("click", () => {
      chatWrapper.style.display = "flex";
    });

    chatClose.addEventListener("click", () => {
      chatWrapper.style.display = "none";
    });
  </script> -->

</body>

</html>

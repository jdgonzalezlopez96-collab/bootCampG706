<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot Inteligente</title>
    <!-- Vinculamos el CSS desde la carpeta static -->
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div id="chatbot">
        <div id="chat-box">
            <div class="message bot-message">¡Hola! 🤖 Escribe algo para comenzar.</div>
        </div>
        
        <!-- Indicador de escribiendo (oculto por defecto) -->
        <div id="typing-indicator" style="display: none; padding: 0 20px;" class="typing">El bot está escribiendo...</div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe un mensaje..." onkeypress="handleKeyPress(event)">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <script>
        function handleKeyPress(e) { if (e.key === 'Enter') enviarMensaje(); }

        async function enviarMensaje() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const typing = document.getElementById('typing-indicator');
            const mensaje = input.value.trim();
            
            if (!mensaje) return;

            // 1. Agregar burbuja del usuario, Usuario escribe 
            box.innerHTML += `<div class="message user-message">${mensaje}</div>`;
            input.value = '';

            // Auto-scroll después de que el usuario escribe
            scrollChat();

            // 2. Mostrar "Escribiendo..."
            typing.style.display = 'block';
            scrollChat();

            try {
                // 2. Llamada a Python (main.py)
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: mensaje })
                });
                const data = await response.json();
                
                // 3. Ocultar "Escribiendo..." Agregar burbuja del bot y mostrar respuesta
                typing.style.display = 'none';
                box.innerHTML += `<div class="message bot-message">${data.respuesta}</div>`;

                // Auto-scroll después de la respuesta del bot
                scrollChat();
            } catch (error) {
                console.error("Error:", error);
                typing.style.display = 'none';
                box.innerHTML += `<div class="message bot-message">⚠️ Error al conectar con el servidor.</div>`;
            }
        }

        // Función de Auto-scroll
        function scrollChat() {
            const box = document.getElementById('chat-box');
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Inteligente</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: wheat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chatbot {
            background: white;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="chatbot">
        <div id="chat-box" style="height: 300px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #ccc;">
            <!-- Aquí aparecerán los mensajes -->
        </div>
        <input type="text" id="user-input" placeholder="Escribe un mensaje..." style="width: 93%; padding: 10px;">
        <button onclick="enviarMensaje()" style="margin-top: 5px;">Enviar</button>
    </div>

    <script>
        async function enviarMensaje() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const mensaje = input.value;
            if (!mensaje) return;

            // Mostrar mensaje del usuario en el div
            box.innerHTML += `<div><b>Tú:</b> ${mensaje}</div>`;
            input.value = '';

            // Petición a Python (main.py)
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: mensaje })
            });

            const data = await response.json();

            // Mostrar respuesta del bot
            box.innerHTML += `<div><b>Bot:</b> ${data.respuesta}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>

</html>
